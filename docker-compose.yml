services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build: .
    command: uv run fastapi dev app/main.py --host 0.0.0.0
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=sqlite:///./dev.db
    depends_on:
      - redis

  worker:
    build: .
    command: uv run taskiq worker app.broker:broker app.tasks.sample
    volumes:
      - .:/app
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=sqlite:///./dev.db
    depends_on:
      - redis

volumes:
  redis_data:
